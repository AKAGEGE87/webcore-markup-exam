<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <nav class="header_nav">
          <ul>
            <li>
              <a href="./index.html">
                <div>
                  <img src="./assets/home_images/svg/home.svg" alt="home" />
                </div>
                <span>Home</span></a
              >
            </li>
            <li>
              <a href="./discover.html">
                <div>
                  <img src="./assets/home_images/svg/star.svg" alt="star" />
                </div>
                <span>Discover</span></a
              >
            </li>
            <li>
              <a href="./search.html">
                <div>
                  <img src="./assets/search_images/svg/search(1).svg" alt="search" />
                </div>
                <span>Search</span></a
              >
            </li>
            <li>
              <a href="#">
                <div>
                  <img
                    src="./assets/home_images/svg/library.svg"
                    alt="library"
                  />
                </div>
                <span>Library</span></a
              >
            </li>
            <li>
              <a href="#">
                <div>
                  <img src="./assets/home_images/svg/user.svg" alt="user" />
                </div>
                <span>Me</span>
              </a>
            </li>
          </ul>
        </nav>
      </header>
      <section class="search-bar">
        <input type="text" class="search-input" placeholder="What do you want to play? " />
        <img class="search-icon" src="./assets/search_images/svg/search.svg" alt="search icon">
        <img class="camera-icon" src="./assets/search_images/svg/camera.svg" alt="camera icon">
      </section>
      <section class="recent-searches">
        <h3>Recent searches</h3>
        <div class="resent-searches-list">
        <div class="recent-searches-box">
        <img src="./assets/search_images/img/daft punk.png" alt="album cover">
        <span>Daft Punk</span></div>
        <div class="recent-searches-box">
        <img src="./assets/search_images/img/david bowie.png" alt="album cover">
        <span>David Bowie</span></div>
        <div class="recent-searches-box">
        <img src="./assets/search_images/img/black holes.png" alt="album cover">
        <span>Black Holes...</span></div>
        </div>
      </section>
      <section class="discover">
        <h3>Browse all</h3>
        <span>Discover</span>
        <div class="search-cards-box">
        <article class="search-made-for-you-card">
          <img class="search-card-imgs" src="./assets/search_images/img/made-for-you.png" alt="card image">
          <h3 class="search-card-headers">Made For You</h3>
        </article>
        <article class="search-new-releases-card">
          <img class="search-card-imgs" src="./assets/search_images/img/new-releasses.png" alt="card image">
          <h3 class="search-card-headers">New Releases</h3>
        </article>
        <article class="search-spotify-classics-card">
          <img class="search-card-imgs" src="./assets/search_images/img/spotify-classics.png" alt="card image">
          <h3 class="search-card-headers">Spotify Classics</h3>
        </article>
        <article class="search-charts-card">
          <img class="search-card-imgs" src="./assets/search_images/img/charts.png" alt="card image">
          <h3 class="search-card-headers">Charts</h3>
        </article>
        <article class="search-trending-card">
          <img class="search-card-imgs" src="./assets/search_images/img/trending.png" alt="card image">
          <h3 class="search-card-headers">Trending</h3>
        </article>
        <article class="search-discover-card">
          <img class="search-card-imgs" src="./assets/search_images/img/discover.png" alt="card image">
          <h3 class="search-card-headers">Discover</h3>
        </article>
        <article class="search-spotify-singles-card">
          <img class="search-card-imgs" src="./assets/search_images/img/spotify-singles.png" alt="card image">
          <h3 class="search-card-headers">Spotify Singles</h3>
        </article>
        <article class="search-decades-card">
          <img class="search-card-imgs" src="./assets/search_images/img/decades.png" alt="card image">
          <h3 class="search-card-headers">Decades</h3>
        </article>
        
        </div>
      </section>
      <section class="genres">
        <span>Genres</span>
        <div class="search-cards-box">
          <article class="search-pop-card">
          <img class="search-card-imgs" src="./assets/search_images/img/pop.png" alt="card image">
          <h3 class="search-card-headers">pop</h3>
        </article>
        <article class="search-country-card">
          <img class="search-card-imgs" src="./assets/search_images/img/country.png" alt="card image">
          <h3 class="search-card-headers">Country</h3>
        </article>
        <article class="search-hip-hop-card">
          <img class="search-card-imgs" src="./assets/search_images/img/hip-hop.png" alt="card image">
          <h3 class="search-card-headers">Hip-hop</h3>
        </article>
        <article class="search-rock-card">
          <img class="search-card-imgs" src="./assets/search_images/img/rock.png" alt="card image">
          <h3 class="search-card-headers">Rock</h3>
        </article>
        <article class="search-indie-card">
          <img class="search-card-imgs" src="./assets/search_images/img/indie.png" alt="card image">
          <h3 class="search-card-headers">Indie</h3>
        </article>
        <article class="search-punk-card">
          <img class="search-card-imgs" src="./assets/search_images/img/punk.png" alt="card image">
          <h3 class="search-card-headers">Punk</h3>
        </article>
        <article class="search-metal-card">
          <img class="search-card-imgs" src="./assets/search_images/img/metal.png" alt="card image">
          <h3 class="search-card-headers">Metal</h3>
        </article>
        <article class="search-instrumental-card">
          <img class="search-card-imgs" src="./assets/search_images/img/instrumental.png" alt="card image">
          <h3 class="search-card-headers">Instrumental</h3>
        </article>
        </div>
      </section>
  </body>
</html>
