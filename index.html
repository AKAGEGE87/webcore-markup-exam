<!doctype html>

  <head>

    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <nav class="header_nav">
          <ul>
            <li>
              <a href="./index.html">
                <div>

                </div>
                <span>Home</span></a
              >
            </li>
            <li>
              <a href="./discover.html">
                <div>
                  <img src="./assets/home_images/svg/star.svg" alt="star" />

                <span>Discover</span></a
              >
            </li>
            <li>
              <a href="./search.html">
                <div>

            <li>

          </ul>
        </nav>
      </header>
      <div class="main_box">
        <aside class="sidebar">
          <section class="sidebar_section">
            <button>Music</button>
            <button>Podcasts</button>
            <button>Audiobooks</button>
          </section>
          <article>
            <img src="./assets/home_images/svg/sidebar.svg" alt="sidebar" />
          </article>
        </aside>
        <main class="home_main_box">
          <section class="home_main_box_catalog">
            <article class="home_main_box_catalog_card">
              <img src="./assets/home_images/img/1.png" alt="lucky" />
              <div class="text_box">
                <h3>Get Lucky (feat. Pharrell Williams and Nile Rodgers)</h3>
                <p>Daft Punk</p>
              </div>
            </article>

            <article class="home_main_box_catalog_card">
              <img src="./assets/home_images/img/3.png" alt="lucky" />
              <div class="text_box">
                <h3>Daily Mix 2</h3>
              </div>
            </article>

            <article class="home_main_box_catalog_card">
              <img src="./assets/home_images/img/2.png" alt="lucky" />
              <div class="text_box">
                <h3>Daily Mix 1</h3>
              </div>
            </article>

            <article class="home_main_box_catalog_card">
              <img src="./assets/home_images/img/1.png" alt="lucky" />
              <div class="text_box">
                <h3>Around the world</h3>
                <p>Daft Punk</p>
              </div>
            </article>

            <article class="home_main_box_catalog_card">
              <img src="./assets/home_images/img/1.png" alt="lucky" />
              <div class="text_box">
                <h3>Instant Crush</h3>
                <p>Daft Punk</p>
              </div>
            </article>

            <article class="home_main_box_catalog_card">
              <img src="./assets/home_images/img/4.png" alt="lucky" />

              <div class="text_box">
                <h3>Rock Mix</h3>
              </div>
            </article>
          </section>
          <section class="home_main_box_made_for_you">
            <article class="home_main_box_made_for_you_card">
              <div class="home_main_box_made_for_you_card_image_box">
                <div
                  class="home_main_box_made_for_you_card_image_box_first_line"
                ></div>
                <div
                  class="home_main_box_made_for_you_card_image_box_second_line"
                ></div>
                <img
                  src="./assets/home_images/img/made_for_you1.png"
                  alt="discover weekly"
                />
              </div>
              <div class="home_main_box_made_for_you_card_text_box">
                <h3>Discover Weekly <span>50</span></h3>
                <p>Your weekly update of the most listened to tracks</p>
              </div>
